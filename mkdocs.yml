site_name: Fora
site_description: Fora user manuals and SDK guides for HLA 4 / IEEE 1516-2025 development.
site_url: https://otopcu.github.io/fora-site/
repo_url: https://github.com/otopcu/fora-site
edit_uri: ""

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Manuals:
      - Overview: manuals/index.md
      - Fora.Client Programmer's Manual: manuals/fora-client-programmers-manual.md
      - Fora.Rti.Admin User Manual: manuals/admin-tool-user-manual.md
      - Fora.Rti.Console User Manual: manuals/console-user-manual.md
